<!DOCTYPE html>
<html >
<head>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>calsi</title>
</head>
<body>
    <div class="cal-body">
        <div class="cal-screen">
            <div class="icon">
                <div class="icon-1">
                    <i class="fa-regular fa-clock"></i>
                    <i class="fa-solid fa-ruler"></i>
                    <i class="fa-solid fa-calculator"></i>
                </div>
                <div>
                    <i class="fa-solid fa-xmark"></i>
                </div>
            </div>
            <div class="btn-color">
                <button>C</button>
                <button>()</button>
                <button>%</button>
                <button>/</button>
            </div>
            <div class="btn">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>X</button>
            </div>
            <div class="btn">
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>-</button>
            </div>
            <div class="btn">
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>+</button>
            </div>
            <div class="btn">
                <button>+/-</button>
                <button>0</button>
                <button>.</button>
                <button class="equal">=</button>
            </div>
        </div>
</body>
</html>
